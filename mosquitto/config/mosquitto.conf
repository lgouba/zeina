# =============================================================================
# Mosquitto — configuration ZEINA
# =============================================================================

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
connection_messages true

# --- Listener TCP MQTT --------------------------------------------------------
listener 1883
protocol mqtt

# --- Listener WebSocket (utilisé par le frontend en option) -------------------
listener 9001
protocol websockets

# --- Authentification ---------------------------------------------------------
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# --- Limites raisonnables MVP -------------------------------------------------
max_connections -1
max_inflight_messages 100
max_queued_messages 1000
message_size_limit 65536
