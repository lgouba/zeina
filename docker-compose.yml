# =============================================================================
# ZEINA — orchestration locale
#
# Étape 1 (en cours) : services d'infra uniquement (db, mqtt, redis, migrate).
# Les services Go (api, ingestor, rules-engine, simulator) seront ajoutés aux
# étapes suivantes.
#
# Démarrage :
#   cp .env.example .env
#   docker compose up -d
#   make migrate-up
# =============================================================================

name: zeina

services:
  # ---------------------------------------------------------------------------
  # TimescaleDB (PostgreSQL 16 + extension TimescaleDB)
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: zeina-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-zeina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_pg}
      POSTGRES_DB:       ${POSTGRES_DB:-zeina}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zeina} -d ${POSTGRES_DB:-zeina}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Mosquitto MQTT broker (TCP 1883 + WebSocket 9001)
  # Le bootstrap script génère /mosquitto/config/passwd à partir des env vars
  # avant de lancer mosquitto.
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: zeina-mosquitto
    restart: unless-stopped
    environment:
      MQTT_API_USER:           ${MQTT_API_USER:-api}
      MQTT_API_PASSWORD:       ${MQTT_API_PASSWORD:-changeme_api}
      MQTT_INGESTOR_USER:      ${MQTT_INGESTOR_USER:-ingestor}
      MQTT_INGESTOR_PASSWORD:  ${MQTT_INGESTOR_PASSWORD:-changeme_ingestor}
      MQTT_RULES_USER:         ${MQTT_RULES_USER:-rules}
      MQTT_RULES_PASSWORD:     ${MQTT_RULES_PASSWORD:-changeme_rules}
      MQTT_SIMULATOR_USER:     ${MQTT_SIMULATOR_USER:-simulator}
      MQTT_SIMULATOR_PASSWORD: ${MQTT_SIMULATOR_PASSWORD:-changeme_sim}
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./scripts/mosquitto-bootstrap.sh:/usr/local/bin/bootstrap.sh:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    entrypoint: ["/bin/sh", "/usr/local/bin/bootstrap.sh"]
    healthcheck:
      # mosquitto_sub avec exit on first message ; on publie via mosquitto_pub
      # un ping à soi-même pour valider que le broker est UP et l'auth OK.
      test:
        - "CMD-SHELL"
        - >
          mosquitto_pub -h localhost -p 1883
          -u "$$MQTT_API_USER" -P "$$MQTT_API_PASSWORD"
          -t healthcheck/ping -m ok -q 0 && echo ok
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Redis (état du rules-engine + cache + rate-limit phase 2)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: zeina-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Non publié sur l'host pour éviter les collisions avec d'autres projets.
    # Les services Go joignent redis via le réseau Docker (redis:6379).
    # Pour debug local : `make redis-cli` exec dans le container.
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Frontend — React build statique servi par nginx + proxy /v1/* → api
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: zeina/frontend:dev
    container_name: zeina-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # API — REST + WebSocket
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: zeina/api:dev
    container_name: zeina-api
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgres://${POSTGRES_USER:-zeina}:${POSTGRES_PASSWORD:-changeme_pg}@timescaledb:5432/${POSTGRES_DB:-zeina}?sslmode=disable
      MQTT_BROKER:           tcp://mosquitto:1883
      MQTT_USER:             ${MQTT_API_USER:-api}
      MQTT_PASSWORD:         ${MQTT_API_PASSWORD:-changeme_api}
      JWT_SECRET:            ${JWT_SECRET:-change_me_to_a_long_random_string_at_least_32_chars}
      JWT_ACCESS_TTL:        ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL:       ${JWT_REFRESH_TTL:-168h}
      CORS_ALLOWED_ORIGINS:  ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      RATE_LIMIT_RPS:        ${RATE_LIMIT_RPS:-20}
      DEMO_TENANT_SLUG:      acme
      LOG_LEVEL:             ${LOG_LEVEL:-info}
      LOG_FORMAT:            ${LOG_FORMAT:-json}
    ports:
      - "3030:3000"   # 3030 sur l'host (3000 déjà pris par un autre projet)
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Rules engine — moteur de règles (subscribe MQTT, évalue, exécute, audit)
  # ---------------------------------------------------------------------------
  rules-engine:
    build:
      context: .
      dockerfile: services/rules-engine/Dockerfile
    image: zeina/rules-engine:dev
    container_name: zeina-rules-engine
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgres://${POSTGRES_USER:-zeina}:${POSTGRES_PASSWORD:-changeme_pg}@timescaledb:5432/${POSTGRES_DB:-zeina}?sslmode=disable
      MQTT_BROKER:         tcp://mosquitto:1883
      MQTT_USER:           ${MQTT_RULES_USER:-rules}
      MQTT_PASSWORD:       ${MQTT_RULES_PASSWORD:-changeme_rules}
      REDIS_URL:           ${REDIS_URL:-redis://redis:6379/0}
      RULES_METRICS_PORT:  ${RULES_METRICS_PORT:-9091}
      LOG_LEVEL:           ${LOG_LEVEL:-info}
      LOG_FORMAT:          ${LOG_FORMAT:-json}
    ports:
      - "9091:9091"
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Ingestor — pont MQTT → TimescaleDB (batch + CopyFrom)
  # ---------------------------------------------------------------------------
  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    image: zeina/ingestor:dev
    container_name: zeina-ingestor
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      DATABASE_URL:           postgres://${POSTGRES_USER:-zeina}:${POSTGRES_PASSWORD:-changeme_pg}@timescaledb:5432/${POSTGRES_DB:-zeina}?sslmode=disable
      MQTT_BROKER:            tcp://mosquitto:1883
      MQTT_USER:              ${MQTT_INGESTOR_USER:-ingestor}
      MQTT_PASSWORD:          ${MQTT_INGESTOR_PASSWORD:-changeme_ingestor}
      INGESTOR_BATCH_SIZE:    ${INGESTOR_BATCH_SIZE:-500}
      INGESTOR_BATCH_TIMEOUT: ${INGESTOR_BATCH_TIMEOUT:-1s}
      INGESTOR_CHANNEL_BUFFER: ${INGESTOR_CHANNEL_BUFFER:-10000}
      INGESTOR_METRICS_PORT:  ${INGESTOR_METRICS_PORT:-9090}
      LOG_LEVEL:              ${LOG_LEVEL:-info}
      LOG_FORMAT:             ${LOG_FORMAT:-json}
    ports:
      - "9090:9090"   # /metrics, /health
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Fake IoTSens — serveur HTTP qui simule l'API du constructeur
  # ---------------------------------------------------------------------------
  iotsens-fake:
    build:
      context: .
      dockerfile: services/connectors/iotsens-fake/Dockerfile
    image: zeina/iotsens-fake:dev
    container_name: zeina-iotsens-fake
    restart: unless-stopped
    environment:
      IOTSENS_FAKE_API_KEY: demo-key-iotsens
    ports:
      - "8081:8081"
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Connector IoTSens — pont API IoTSens → MQTT ZEINA
  # ---------------------------------------------------------------------------
  iotsens-connector:
    build:
      context: .
      dockerfile: services/connectors/iotsens/Dockerfile
    image: zeina/iotsens-connector:dev
    container_name: zeina-iotsens-connector
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      iotsens-fake:
        condition: service_started
    environment:
      DATABASE_URL:           postgres://${POSTGRES_USER:-zeina}:${POSTGRES_PASSWORD:-changeme_pg}@timescaledb:5432/${POSTGRES_DB:-zeina}?sslmode=disable
      MQTT_BROKER:            tcp://mosquitto:1883
      MQTT_USER:              ${MQTT_SIMULATOR_USER:-simulator}
      MQTT_PASSWORD:          ${MQTT_SIMULATOR_PASSWORD:-changeme_sim}
      IOTSENS_URL:            http://iotsens-fake:8081
      IOTSENS_API_KEY:        demo-key-iotsens
      IOTSENS_METRICS_PORT:   9092
      LOG_LEVEL:              ${LOG_LEVEL:-info}
      LOG_FORMAT:             ${LOG_FORMAT:-json}
    ports:
      - "9092:9092"
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Simulator — capteurs virtuels publiant sur MQTT
  # ---------------------------------------------------------------------------
  simulator:
    build:
      context: .
      dockerfile: services/simulator/Dockerfile
    image: zeina/simulator:dev
    container_name: zeina-simulator
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      LOG_LEVEL:        ${LOG_LEVEL:-info}
      LOG_FORMAT:       ${LOG_FORMAT:-json}
      SIMULATOR_CONFIG: /etc/simulator/simulator.yml
    volumes:
      - ./services/simulator/simulator.yml:/etc/simulator/simulator.yml:ro
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # golang-migrate — appliquer les migrations
  #   docker compose --profile tools run --rm migrate up
  #   docker compose --profile tools run --rm migrate down 1
  #   docker compose --profile tools run --rm migrate version
  # Le Makefile expose ces commandes via `make migrate-up` etc.
  # ---------------------------------------------------------------------------
  migrate:
    image: migrate/migrate:v4.18.1
    container_name: zeina-migrate
    profiles: ["tools"]
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    entrypoint:
      - migrate
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-zeina}:${POSTGRES_PASSWORD:-changeme_pg}@timescaledb:5432/${POSTGRES_DB:-zeina}?sslmode=disable
    networks: [zeina]

# -----------------------------------------------------------------------------
volumes:
  timescaledb_data:
  mosquitto_data:
  mosquitto_log:
  redis_data:

networks:
  zeina:
    driver: bridge
