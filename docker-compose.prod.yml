# =============================================================================
# ZEINA — override de production (VPS qalitylabs.fr)
#
# Reverse proxy : jwilder/nginx-proxy + nginxproxy/acme-companion sur le réseau
# externe `apps_web`. Les vhosts et certificats Let's Encrypt sont auto-générés
# à partir des env vars VIRTUAL_HOST / LETSENCRYPT_HOST des containers.
#
#   - https://zeina.qalitylabs.fr     → zeina-frontend:80 (SPA + proxy interne /v1/*)
#   - https://api-zeina.qalitylabs.fr → zeina-api:3000    (REST + WebSocket)
#
# Aucun port n'est publié sur l'host pour les services internes (DB / MQTT /
# Redis / metrics) — ils restent uniquement sur le réseau Docker `zeina`.
#
# Usage :
#   cp .env.prod.example .env.prod && nano .env.prod
#   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml --profile tools run --rm migrate up
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infra interne — pas de ports publiés sur l'host en prod
  # ---------------------------------------------------------------------------
  timescaledb:
    ports: !reset []
    networks: [zeina]

  mosquitto:
    # Pas de port publié sur l'host par défaut (évite conflits avec d'autres
    # projets sur le VPS). Si un capteur externe doit se connecter en MQTT,
    # republier ici : ports: ["1883:1883"]
    ports: !reset []
    networks: [zeina]

  redis:
    networks: [zeina]

  # ---------------------------------------------------------------------------
  # Frontend — auto-détecté par nginx-proxy via VIRTUAL_HOST
  # ---------------------------------------------------------------------------
  frontend:
    ports: !reset []
    expose:
      - "80"
    environment:
      VIRTUAL_HOST:        ${FRONTEND_DOMAIN:-zeina.qalitylabs.fr}
      VIRTUAL_PORT:        "80"
      LETSENCRYPT_HOST:    ${FRONTEND_DOMAIN:-zeina.qalitylabs.fr}
      LETSENCRYPT_EMAIL:   ${LETSENCRYPT_EMAIL}
    networks:
      - zeina
      - apps_web

  # ---------------------------------------------------------------------------
  # API — auto-détectée par nginx-proxy via VIRTUAL_HOST
  # ---------------------------------------------------------------------------
  api:
    ports: !reset []
    expose:
      - "3000"
    environment:
      DATABASE_URL:          postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}?sslmode=disable
      MQTT_BROKER:           tcp://mosquitto:1883
      MQTT_USER:             ${MQTT_API_USER}
      MQTT_PASSWORD:         ${MQTT_API_PASSWORD}
      JWT_SECRET:            ${JWT_SECRET}
      JWT_ACCESS_TTL:        ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL:       ${JWT_REFRESH_TTL:-168h}
      CORS_ALLOWED_ORIGINS:  ${CORS_ALLOWED_ORIGINS}
      RATE_LIMIT_RPS:        ${RATE_LIMIT_RPS:-20}
      DEMO_TENANT_SLUG:      ${DEMO_TENANT_SLUG:-acme}
      LOG_LEVEL:             ${LOG_LEVEL:-info}
      LOG_FORMAT:            ${LOG_FORMAT:-json}
      # nginx-proxy auto-discovery
      VIRTUAL_HOST:          ${API_DOMAIN:-api-zeina.qalitylabs.fr}
      VIRTUAL_PORT:          "3000"
      LETSENCRYPT_HOST:      ${API_DOMAIN:-api-zeina.qalitylabs.fr}
      LETSENCRYPT_EMAIL:     ${LETSENCRYPT_EMAIL}
    networks:
      - zeina
      - apps_web

  # ---------------------------------------------------------------------------
  # Workers — pas de ports host (metrics scrapés en interne si besoin)
  # ---------------------------------------------------------------------------
  rules-engine:
    ports: !reset []
    networks: [zeina]

  ingestor:
    ports: !reset []
    networks: [zeina]

  iotsens-fake:
    ports: !reset []
    networks: [zeina]

  iotsens-connector:
    ports: !reset []
    networks: [zeina]

  simulator:
    networks: [zeina]

  migrate:
    networks: [zeina]

# -----------------------------------------------------------------------------
networks:
  zeina:
    driver: bridge
  apps_web:
    external: true
